<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Menú Semanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#141006; --bg2:#211a0b; --bg3:#2d240f; --bg4:#3a2d12;
      --border:rgba(255,214,89,.14); --border2:rgba(255,214,89,.30);
      --gold:#ffd34d; --gold-dim:rgba(255,211,77,.16);
      --green:#ffd34d; --green-dim:rgba(255,211,77,.16);
      --red:#e05555; --red-dim:rgba(224,85,85,.12);
      --text:#fff6d6; --text-dim:#d7c88d; --text-muted:#8e7c3f;
      --input-bg:#1a1408; --radius:8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Karla',sans-serif;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 0% 0%,rgba(255,211,77,.10) 0%,transparent 60%);pointer-events:none;z-index:0}

    /* ── LOGIN ── */
    #login-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center}
    .login-box{width:340px;padding:40px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;text-align:center}
    .login-logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--gold);margin-bottom:6px}
    .login-sub{font-size:11px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
    .login-box input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Karla',sans-serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s;margin-bottom:12px}
    .login-box input:focus{border-color:var(--gold)}
    .btn-login{width:100%;background:var(--gold);color:#0a0e0c;font-family:'Karla',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:8px;padding:13px;cursor:pointer;transition:opacity .2s}
    .btn-login:hover{opacity:.85}
    .login-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}

    /* ── LAYOUT ── */
    .app{position:relative;z-index:1;display:grid;grid-template-columns:220px 1fr;min-height:100vh}
    @media(max-width:700px){.app{grid-template-columns:1fr}}

    /* ── SIDEBAR ── */
    aside{background:var(--bg2);border-right:1px solid var(--border);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
    @media(max-width:700px){aside{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:16px 0}}
    .sidebar-brand{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
    .sidebar-brand h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold)}
    .sidebar-brand p{font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
    .day-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px}
    @media(max-width:700px){.day-nav{flex-direction:row;overflow-x:auto;padding:0 12px}}
    .day-nav-btn{background:transparent;border:1px solid transparent;color:var(--text-dim);font-family:'Karla',sans-serif;font-size:13px;font-weight:500;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .18s;text-align:left;white-space:nowrap;display:flex;align-items:center;gap:8px;width:100%}
    @media(max-width:700px){.day-nav-btn{width:auto}}
    .day-nav-btn:hover{background:var(--bg3);color:var(--text)}
    .day-nav-btn.active{background:var(--green-dim);border-color:rgba(255,211,77,.32);color:var(--green)}
    .day-nav-btn .badge{font-size:9px;padding:2px 6px;border-radius:10px;background:var(--gold-dim);color:var(--gold);margin-left:auto;flex-shrink:0}
    @media(max-width:700px){.day-nav-btn .badge{display:none}}
    .sidebar-footer{padding:16px 20px 0;margin-top:auto}
    .btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:'Karla',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .18s;width:100%}
    .btn-logout:hover{border-color:var(--red);color:var(--red)}
    .view-link{display:block;text-align:center;color:var(--text-muted);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;padding:10px;margin:4px 10px;border-radius:8px;transition:all .18s}
    .view-link:hover{color:var(--gold);background:var(--gold-dim)}

    /* ── MAIN CONTENT ── */
    main{padding:28px 24px 60px;overflow-y:auto}
    @media(max-width:700px){main{padding:20px 16px 60px}}

    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
    .section-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--text)}
    .section-title span{font-size:14px;font-family:'Karla',sans-serif;font-weight:400;color:var(--text-muted);margin-left:10px}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;gap:6px;font-family:'Karla',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:9px 16px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .18s;white-space:nowrap}
    .btn-primary{background:var(--green);color:#060e08;border-color:var(--green)}
    .btn-primary:hover{opacity:.85}
    .btn-ghost{background:transparent;color:var(--text-dim);border-color:var(--border)}
    .btn-ghost:hover{border-color:var(--border2);color:var(--text)}
    .btn-danger{background:transparent;color:var(--red);border-color:rgba(224,85,85,.3)}
    .btn-danger:hover{background:var(--red-dim)}
    .btn-sm{padding:6px 10px;font-size:11px}

    /* ── DAY META ── */
    .meta-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:20px}
    .meta-card h3{font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
    .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:500px){.meta-grid{grid-template-columns:1fr}}
    .meta-grid.four{grid-template-columns:repeat(4,1fr)}
    @media(max-width:600px){.meta-grid.four{grid-template-columns:repeat(2,1fr)}}
    .field{display:flex;flex-direction:column;gap:5px}
    .field label{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase}
    .field input,.field textarea,.field select{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Karla',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s;width:100%}
    .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green)}
    .field textarea{resize:vertical;min-height:70px;font-size:13px}
    .toggle-row{display:flex;align-items:center;gap:10px}
    .toggle{position:relative;width:42px;height:24px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .toggle-slider{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:.2s}
    .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:var(--text-muted);border-radius:50%;transition:.2s}
    .toggle input:checked + .toggle-slider{background:var(--gold-dim);border-color:rgba(201,168,76,.4)}
    .toggle input:checked + .toggle-slider::before{transform:translateX(18px);background:var(--gold)}
    .toggle-label{font-size:13px;color:var(--text-dim)}

    /* ── MEAL CARDS ── */
    .meals-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .meal-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
    .meal-row:hover{border-color:var(--border2)}
    .meal-row-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
    .meal-row-icon{font-size:20px;width:32px;text-align:center}
    .meal-row-info{flex:1;min-width:0}
    .meal-row-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
    .meal-row-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
    .meal-row-kcal{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold);white-space:nowrap}
    .meal-row-actions{display:flex;gap:6px;flex-shrink:0}
    .chevron{font-size:12px;color:var(--text-muted);transition:transform .2s;margin-left:4px}
    .meal-row.open .chevron{transform:rotate(180deg)}

    .meal-form{display:none;padding:0 14px 16px;border-top:1px solid var(--border);animation:fadeIn .2s ease}
    .meal-row.open .meal-form{display:block}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .meal-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 12px}
    @media(max-width:500px){.meal-form-grid{grid-template-columns:1fr}}
    .meal-form-grid.five{grid-template-columns:repeat(5,1fr)}
    @media(max-width:600px){.meal-form-grid.five{grid-template-columns:repeat(2,1fr)}}
    .items-editor{display:flex;flex-direction:column;gap:6px;margin-top:6px}
    .item-row{display:flex;gap:6px;align-items:center}
    .item-row input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Karla',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color .2s}
    .item-row input:focus{border-color:var(--green)}
    .btn-icon{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .18s;flex-shrink:0}
    .btn-icon:hover{border-color:var(--red);color:var(--red)}
    .btn-icon.add:hover{border-color:var(--green);color:var(--green)}
    .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#060e08;font-family:'Karla',sans-serif;font-size:13px;font-weight:600;padding:12px 20px;border-radius:10px;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
    .toast.err{background:var(--red);color:#fff}
    .toast.show{opacity:1;transform:translateY(0)}

    /* ── SAVING INDICATOR ── */
    .saving{font-size:11px;color:var(--green);letter-spacing:1.5px;text-transform:uppercase;opacity:0;transition:opacity .3s}
    .saving.visible{opacity:1}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚙</div>
    <div class="login-sub">Panel de administración</div>
    <input type="password" id="pwd-input" placeholder="Contraseña" />
    <button class="btn-login" id="login-btn">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <aside>
    <div class="sidebar-brand">
      <h1>ComidaSemanal</h1>
      <p>Panel Admin</p>
    </div>
    <nav class="day-nav" id="day-nav"></nav>
    <div style="padding:0 10px;margin-top:8px">
      <a href="/" class="view-link">← Ver web</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
    </div>
  </aside>

  <main id="main-content">
    <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--text-muted);font-size:13px;letter-spacing:2px;text-transform:uppercase">Cargando...</div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let TOKEN = sessionStorage.getItem('admin_token') || '';
let DAYS  = [];
let activeDay = new Date().getDay();

// ── HELPERS ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const toast = (msg, err=false) => {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (err?' err':'') + ' show';
  setTimeout(() => t.className = 'toast', 2500);
};

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type':'application/json', 'X-Admin-Token': TOKEN },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
async function login() {
  const pwd = $('pwd-input').value;
  $('login-err').textContent = '';
  try {
    const data = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pwd })
    }).then(r => r.json());
    if (!data.token) throw new Error(data.error || 'Error');
    TOKEN = data.token;
    sessionStorage.setItem('admin_token', TOKEN);
    showApp();
  } catch(e) {
    $('login-err').textContent = e.message === 'Contraseña incorrecta' ? 'Contraseña incorrecta' : 'Error de conexión';
    $('pwd-input').value = '';
  }
}

$('login-btn').addEventListener('click', login);
$('pwd-input').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

async function checkExistingToken() {
  if (!TOKEN) return;
  try {
    await api('GET', '/api/auth/verify');
    showApp();
  } catch { TOKEN = ''; sessionStorage.removeItem('admin_token'); }
}

$('logout-btn').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method:'POST', headers:{'X-Admin-Token':TOKEN} }).catch(()=>{});
  TOKEN = '';
  sessionStorage.removeItem('admin_token');
  location.reload();
});

// ── APP ────────────────────────────────────────────────────────────────────
async function showApp() {
  $('login-screen').style.display = 'none';
  $('app').style.display = 'grid';
  try {
    const res = await fetch('/api/meals');
    DAYS = await res.json();
    renderSidebar();
    renderDay(activeDay);
  } catch(e) {
    toast('Error cargando datos', true);
  }
}

function renderSidebar() {
  const nav = $('day-nav');
  nav.innerHTML = '';
  DAYS.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-nav-btn' + (i===activeDay?' active':'');
    btn.innerHTML = `${day.label}<span class="badge">${day.workout?'Entreno':'Descanso'}</span>`;
    btn.addEventListener('click', () => { activeDay = i; renderSidebar(); renderDay(i); });
    nav.appendChild(btn);
  });
}

// ── DAY RENDER ─────────────────────────────────────────────────────────────
function renderDay(dayIdx) {
  const day = DAYS[dayIdx];
  const main = $('main-content');
  main.innerHTML = `
    <div class="section-header">
      <div class="section-title">${day.label} <span>${day.meals.length} comidas</span></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="saving" id="saving-ind">Guardado ✓</span>
        <button class="btn btn-primary" id="btn-add-meal">+ Añadir comida</button>
      </div>
    </div>

    <!-- META -->
    <div class="meta-card">
      <h3>Configuración del día</h3>
      <div class="meta-grid" style="margin-bottom:12px">
        <div class="field">
          <label>Nota del día</label>
          <textarea id="meta-note" rows="2">${day.note||''}</textarea>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="field">
            <label>Tipo de día</label>
            <div class="toggle-row">
              <label class="toggle">
                <input type="checkbox" id="meta-workout" ${day.workout?'checked':''}>
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label" id="workout-label">${day.workout?'Día de entreno':'Día de descanso'}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="meta-grid four" style="margin-bottom:14px">
        <div class="field"><label>kcal total</label><input type="number" id="meta-kcal" value="${day.kcal}" /></div>
        <div class="field"><label>Proteína (g)</label><input type="number" id="meta-protein" value="${day.protein}" /></div>
        <div class="field"><label>Carbos (g)</label><input type="number" id="meta-carbs" value="${day.carbs}" /></div>
        <div class="field"><label>Grasa (g)</label><input type="number" id="meta-fat" value="${day.fat}" /></div>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" id="btn-save-meta">Guardar día</button>
      </div>
    </div>

    <!-- MEALS -->
    <div class="meals-list" id="meals-list">
      ${day.meals.map((meal, mi) => mealCardHTML(dayIdx, mi, meal)).join('')}
    </div>
  `;

  // Workout toggle label
  $('meta-workout').addEventListener('change', e => {
    $('workout-label').textContent = e.target.checked ? 'Día de entreno' : 'Día de descanso';
  });

  // Save meta
  $('btn-save-meta').addEventListener('click', () => saveMeta(dayIdx));

  // Add meal
  $('btn-add-meal').addEventListener('click', () => addMeal(dayIdx));

  // Bind meal cards
  bindMealCards(dayIdx);
}

function mealCardHTML(dayIdx, mi, meal) {
  const itemsHTML = meal.items.map((item, ii) => `
    <div class="item-row" data-item="${ii}">
      <input type="text" class="item-input" value="${escHtml(item)}" placeholder="Ingrediente o descripción" />
      <button class="btn-icon" onclick="removeItem(${dayIdx},${mi},${ii})" title="Eliminar">✕</button>
    </div>
  `).join('');

  return `
    <div class="meal-row" id="meal-row-${mi}">
      <div class="meal-row-header" onclick="toggleMeal(${mi})">
        <div class="meal-row-icon">${meal.icon}</div>
        <div class="meal-row-info">
          <div class="meal-row-name">${escHtml(meal.name)}</div>
          <div class="meal-row-meta">${meal.time} · P:${meal.p}g C:${meal.c}g G:${meal.f}g</div>
        </div>
        <div class="meal-row-kcal">${meal.kcal} kcal</div>
        <div class="meal-row-actions">
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteMeal(${dayIdx},${mi})" title="Eliminar comida">Eliminar</button>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="meal-form">
        <div class="meal-form-grid five">
          <div class="field" style="grid-column:span 2"><label>Emoji icono</label><input type="text" class="f-icon" value="${meal.icon}" placeholder="☀️" /></div>
          <div class="field" style="grid-column:span 3"><label>Nombre</label><input type="text" class="f-name" value="${escHtml(meal.name)}" placeholder="Desayuno" /></div>
          <div class="field"><label>Hora</label><input type="text" class="f-time" value="${escHtml(meal.time)}" placeholder="~8:00" /></div>
          <div class="field"><label>kcal</label><input type="number" class="f-kcal" value="${meal.kcal}" /></div>
          <div class="field"><label>Proteína (g)</label><input type="number" class="f-p" value="${meal.p}" /></div>
          <div class="field"><label>Carbos (g)</label><input type="number" class="f-c" value="${meal.c}" /></div>
          <div class="field"><label>Grasa (g)</label><input type="number" class="f-f" value="${meal.f}" /></div>
        </div>
        <div class="field">
          <label>Ingredientes / descripción</label>
          <div class="items-editor" id="items-editor-${mi}">${itemsHTML}</div>
          <button class="btn-icon add" style="margin-top:8px;width:100%;border-radius:8px;height:32px;font-size:13px" onclick="addItem(${dayIdx},${mi})">+ Añadir ingrediente</button>
        </div>
        <div class="form-actions">
          <button class="btn btn-ghost btn-sm" onclick="toggleMeal(${mi})">Cancelar</button>
          <button class="btn btn-primary btn-sm" onclick="saveMeal(${dayIdx},${mi})">Guardar comida</button>
        </div>
      </div>
    </div>
  `;
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleMeal(mi) {
  const row = document.getElementById(`meal-row-${mi}`);
  row.classList.toggle('open');
}

function bindMealCards(dayIdx) {
  // cards are in DOM, actions use inline onclick
}

// ── SAVE META ──────────────────────────────────────────────────────────────
async function saveMeta(dayIdx) {
  const note    = $('meta-note').value;
  const workout = $('meta-workout').checked;
  const kcal    = parseInt($('meta-kcal').value)||0;
  const protein = parseInt($('meta-protein').value)||0;
  const carbs   = parseInt($('meta-carbs').value)||0;
  const fat     = parseInt($('meta-fat').value)||0;
  try {
    await api('PATCH', `/api/meals/${dayIdx}/meta`, {note,workout,kcal,protein,carbs,fat});
    DAYS[dayIdx] = {...DAYS[dayIdx], note,workout,kcal,protein,carbs,fat};
    renderSidebar();
    showSaving();
    toast('Día guardado ✓');
  } catch(e) { toast('Error: '+e.message, true); }
}

// ── SAVE MEAL ──────────────────────────────────────────────────────────────
async function saveMeal(dayIdx, mi) {
  const row = document.getElementById(`meal-row-${mi}`);
  const icon = row.querySelector('.f-icon').value.trim() || '🍽️';
  const name = row.querySelector('.f-name').value.trim();
  const time = row.querySelector('.f-time').value.trim();
  const kcal = parseInt(row.querySelector('.f-kcal').value)||0;
  const p    = parseInt(row.querySelector('.f-p').value)||0;
  const c    = parseInt(row.querySelector('.f-c').value)||0;
  const f    = parseInt(row.querySelector('.f-f').value)||0;
  const items = Array.from(row.querySelectorAll('.item-input')).map(i=>i.value.trim()).filter(Boolean);
  const meal  = {icon,name,time,kcal,p,c,f,items};
  try {
    await api('PUT', `/api/meals/${dayIdx}/${mi}`, meal);
    DAYS[dayIdx].meals[mi] = meal;
    row.classList.remove('open');
    // Update summary in header
    row.querySelector('.meal-row-icon').textContent = icon;
    row.querySelector('.meal-row-name').textContent = name;
    row.querySelector('.meal-row-meta').textContent = `${time} · P:${p}g C:${c}g G:${f}g`;
    row.querySelector('.meal-row-kcal').textContent = `${kcal} kcal`;
    showSaving();
    toast('Comida guardada ✓');
  } catch(e) { toast('Error: '+e.message, true); }
}

// ── DELETE MEAL ────────────────────────────────────────────────────────────
async function deleteMeal(dayIdx, mi) {
  if (!confirm(`¿Eliminar "${DAYS[dayIdx].meals[mi].name}"?`)) return;
  try {
    await api('DELETE', `/api/meals/${dayIdx}/${mi}`);
    DAYS[dayIdx].meals.splice(mi, 1);
    renderDay(dayIdx);
    toast('Comida eliminada');
  } catch(e) { toast('Error: '+e.message, true); }
}

// ── ADD MEAL ───────────────────────────────────────────────────────────────
async function addMeal(dayIdx) {
  const meal = {icon:'🍽️',name:'Nueva comida',time:'~00:00',kcal:0,p:0,c:0,f:0,items:['Ingrediente 1']};
  try {
    const res = await api('POST', `/api/meals/${dayIdx}/meal`, meal);
    DAYS[dayIdx].meals.push(meal);
    renderDay(dayIdx);
    // Auto-open last card
    const newMi = DAYS[dayIdx].meals.length - 1;
    setTimeout(() => {
      document.getElementById(`meal-row-${newMi}`)?.classList.add('open');
      document.getElementById(`meal-row-${newMi}`)?.scrollIntoView({behavior:'smooth', block:'center'});
    }, 50);
    toast('Comida añadida');
  } catch(e) { toast('Error: '+e.message, true); }
}

// ── ITEM MANAGEMENT ────────────────────────────────────────────────────────
function addItem(dayIdx, mi) {
  const editor = document.getElementById(`items-editor-${mi}`);
  const newIdx = editor.children.length;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.dataset.item = newIdx;
  div.innerHTML = `
    <input type="text" class="item-input" value="" placeholder="Ingrediente o descripción" />
    <button class="btn-icon" onclick="removeItemEl(this)" title="Eliminar">✕</button>
  `;
  editor.appendChild(div);
  div.querySelector('input').focus();
}

function removeItemEl(btn) {
  btn.closest('.item-row').remove();
}

function removeItem(dayIdx, mi, ii) {
  // Find and remove from DOM directly
  const editor = document.getElementById(`items-editor-${mi}`);
  const rows = editor.querySelectorAll('.item-row');
  if (rows[ii]) rows[ii].remove();
}

function showSaving() {
  const el = $('saving-ind');
  if (!el) return;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2000);
}

// ── INIT ───────────────────────────────────────────────────────────────────
checkExistingToken();
